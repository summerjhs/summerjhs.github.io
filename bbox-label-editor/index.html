<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3;url=../vin-label-editor/">
<title>이동됨 — BBox Label Editor</title>
<style>
:root{--blue-1:#D2E0FB;--cream:#FEF9D9;--blue-2:#8EACCD;
  --ink:#121c2e;--muted:#3f5170;--border:#ccdaf2;--bg:#f7faff;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI',sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px;
  background-image:radial-gradient(700px 340px at 50% -120px,var(--blue-1),transparent 70%),
                   radial-gradient(600px 300px at 90% 5%,var(--cream),transparent 72%);}
.box{background:#fff;border:1px solid var(--border);border-radius:16px;padding:36px;max-width:460px;text-align:center;
  box-shadow:0 8px 24px -16px rgba(18,28,46,.25)}
h1{font-size:20px;margin-bottom:12px;letter-spacing:-0.02em}
p{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:22px}
code{background:var(--cream);padding:2px 6px;border-radius:5px;font-size:13px;color:var(--ink)}
a{display:inline-block;background:var(--blue-1);color:var(--ink);text-decoration:none;
  padding:11px 22px;border-radius:9px;font-weight:600;font-size:14px}
a:hover{background:var(--blue-2)}
</style>
</head>
<body>
<div class="box">
  <h1>BBox Label Editor 주소가 바뀌었습니다</h1>
  <p>이 주소는 더 이상 사용하지 않습니다.<br>
     새 주소는 <code>../vin-label-editor/</code> 입니다.<br>
     3초 후 자동으로 이동합니다. 북마크를 갱신해 주세요.</p>
  <a href="../vin-label-editor/">지금 이동</a>
</div>
</body>
</html>
