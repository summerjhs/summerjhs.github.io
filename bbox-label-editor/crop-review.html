<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Review — 라벨별 크롭 검수</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.top-bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #16213e; border-bottom: 1px solid #333; flex-shrink: 0; }
.top-bar label { font-size: 13px; color: #aaa; }
.top-bar input[type="file"] { display: none; }
.btn { background: #0f3460; color: #e0e0e0; border: none; border-radius: 4px; padding: 6px 14px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #1a5276; }
.btn:disabled { background: #333; color: #666; cursor: default; }
.btn-primary { background: #e94560; color: #fff; font-weight: bold; }
.btn-primary:hover { background: #d63851; }
.btn-save { background: #4ecdc4; color: #1a1a2e; font-weight: bold; }
.btn-save:hover { background: #45b7aa; }
.btn-csv { background: #f6c744; color: #1a1a2e; font-weight: bold; }
.btn-csv:hover { background: #e0b430; }
.status-text { font-size: 12px; color: #aaa; margin-left: auto; }

.main { display: flex; flex: 1; overflow: hidden; }

/* 라벨 목록 */
.sidebar { width: 210px; min-width: 160px; display: flex; flex-direction: column; border-right: 1px solid #333; background: #16213e; flex-shrink: 0; }
.sidebar h3 { font-size: 11px; color: #888; padding: 8px 10px 4px; text-transform: uppercase; letter-spacing: 1px; }
.label-list { flex: 1; overflow-y: auto; }
.label-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #1a1a2e; }
.label-item:hover { background: #1a3a5c; }
.label-item.active { background: #0f3460; }
.label-item .chip { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: bold; font-family: Consolas, monospace; font-size: 14px; flex-shrink: 0; }
.label-item .cnt { color: #aaa; font-size: 12px; margin-left: auto; }
.label-item.problem-group .chip { background: #ff2d2d; color: #fff; }

/* 메인 */
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.edit-bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #16213e; border-bottom: 1px solid #333; flex-shrink: 0; min-height: 46px; flex-wrap: wrap; }
.edit-bar .info { font-size: 13px; color: #ccc; }
.edit-bar input[type="text"].label-in { width: 46px; background: #1a1a2e; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 5px; font-size: 16px; text-align: center; text-transform: uppercase; outline: none; }
.edit-bar input[type="text"].label-in:focus { border-color: #e94560; }
.edit-bar .hint { font-size: 11px; color: #777; margin-left: auto; }

.grid-wrap { flex: 1; overflow-y: auto; padding: 12px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap: 10px; }
.cell { position: relative; background: #0d1117; border: 2px solid #333; border-radius: 6px; overflow: hidden; cursor: pointer; }
.cell canvas { display: block; width: 100%; height: 104px; background: #000; }
.cell .cap { font-size: 9px; color: #999; text-align: center; padding: 2px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cell.selected { border-color: #4ecdc4; box-shadow: 0 0 0 2px #4ecdc4 inset; }
.cell.problem { border-color: #ff2d2d; }
.cell.unable { border-color: #ffb000; }
.cell.unable::after { content: '🚫'; position: absolute; top: 2px; left: 2px; font-size: 15px; text-shadow: 0 0 3px #000; }
.label-item.unable-group .chip { background: #ffb000; color: #1a1a2e; }
.cell.edited { border-color: #f6c744; }
.cell .flagbtn { position: absolute; top: 3px; right: 3px; width: 22px; height: 22px; border: none; border-radius: 4px; background: rgba(40,40,60,0.8); color: #ff8080; font-size: 13px; cursor: pointer; line-height: 22px; text-align: center; padding: 0; }
.cell .flagbtn:hover { background: rgba(255,45,45,0.85); color: #fff; }
.cell.problem .flagbtn { background: #ff2d2d; color: #fff; }

.placeholder { grid-column: 1/-1; color: #666; text-align: center; padding: 40px; font-size: 14px; }

.bottom-bar { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: #16213e; border-top: 1px solid #333; flex-shrink: 0; }
.bottom-bar .status { flex: 1; font-size: 12px; color: #aaa; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

/* 원본 이미지 모달 */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
.ov-box { background: #16213e; border: 1px solid #333; border-radius: 10px; width: 96vw; height: 92vh; display: flex; flex-direction: column; overflow: hidden; }
.ov-head { display: flex; align-items: center; gap: 12px; padding: 8px 14px; border-bottom: 1px solid #333; flex-shrink: 0; }
.ov-head #ovCaption { font-size: 13px; color: #ccc; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ov-canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #000; }
.ov-canvas-wrap canvas { display: block; }
</style>
</head>
<body>

<div class="top-bar">
    <label>데이터 로드:</label>
    <input type="file" id="folderInput" webkitdirectory multiple>
    <button class="btn btn-primary" onclick="document.getElementById('folderInput').click()">이미지 폴더 열기</button>
    <input type="file" id="jsonInput" accept=".json,.ndjson,.txt">
    <button class="btn btn-save" onclick="document.getElementById('jsonInput').click()">JSON 열기</button>
    <span class="status-text" id="topStatus">이미지 폴더와 JSON을 선택하세요</span>
</div>

<div class="main">
    <div class="sidebar">
        <h3>라벨 그룹</h3>
        <div class="label-list" id="labelList"></div>
    </div>
    <div class="content">
        <div class="edit-bar">
            <span class="info" id="cropInfo">라벨 그룹을 선택하세요</span>
            <label style="font-size:12px;color:#aaa;">라벨 수정:</label>
            <input type="text" class="label-in" id="labelInput" maxlength="1" disabled>
            <button class="btn btn-primary" id="btnApply" disabled onclick="applyLabel()">적용</button>
            <button class="btn" id="btnFlag" disabled onclick="toggleProblem()">&#9873; 문제 표시</button>
            <button class="btn" id="btnUnable" disabled onclick="toggleUnable()">&#128683; 작업 불가</button>
            <button class="btn" id="btnOriginal" disabled onclick="openOriginal()">&#128269; 원본 보기</button>
            <span class="hint">크롭 클릭 → 선택 · 라벨 입력 후 Enter · q=문제표시 · 더블클릭/o=원본</span>
        </div>
        <div class="grid-wrap" id="gridWrap">
            <div class="grid" id="grid"><div class="placeholder">이미지 폴더와 JSON을 로드한 뒤 왼쪽에서 라벨을 선택하세요.</div></div>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <span class="status" id="bottomStatus">준비</span>
    <button class="btn btn-save" onclick="saveJson()">&#128190; 교정 JSON 저장</button>
    <button class="btn btn-csv" onclick="exportCsv()">&#128229; 문제 dataID CSV</button>
</div>

<script>
// ── 상태 ──────────────────────────────────────────────────
let entries = [];          // {dataID, filename, imageFile, record, nameKey, boxes[]}
let loadedImages = {};     // { filename: File }
let loadedRecords = [];
let jsonFileName = 'result.json';
let labelIndex = new Map(); // label -> [{entryIdx, boxIdx}]
let currentLabel = null;    // 선택된 라벨 그룹 (또는 '__PROBLEM__')
let selectedCell = null;    // 선택된 DOM cell

const PROBLEM_GROUP = '__PROBLEM__';
const UNABLE_GROUP = '__UNABLE__';

const COLORS = [
    "#FF4444","#44FF44","#4488FF","#FFFF44","#FF44FF","#44FFFF",
    "#FF8844","#8844FF","#4488FF","#FF4488","#88FF44","#44FF88",
];
const colorCache = {};
let colorSeq = 0;
function colorForLabel(label) {
    if (!(label in colorCache)) colorCache[label] = COLORS[colorSeq++ % COLORS.length];
    return colorCache[label];
}

const num = (x) => (typeof x === 'number' ? x : parseFloat(x) || 0);

function textColorFor(hex) {
    const m = /^#?([0-9a-f]{6})$/i.exec(hex || '');
    if (!m) return '#fff';
    const n = parseInt(m[1], 16);
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    const lum = 0.299 * r + 0.587 * g + 0.114 * b;
    return lum > 150 ? '#000' : '#fff';
}

function csvCell(v) {
    const s = (v == null ? '' : String(v));
    return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function nameKeyOf(record) {
    for (const k in record) { if (k.startsWith('name_')) return k; }
    return null;
}

// ── 로드 ──────────────────────────────────────────────────
document.getElementById('folderInput').addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    loadedImages = {};
    for (const f of files) {
        const lower = f.name.toLowerCase();
        if (lower.endsWith('.jpg') || lower.endsWith('.jpeg') || lower.endsWith('.png') || lower.endsWith('.bmp')) {
            loadedImages[f.name] = f;
        }
    }
    rebuild();
});

document.getElementById('jsonInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    jsonFileName = file.name;
    const text = await file.text();
    const records = [];
    text.split(/\r?\n/).forEach(line => {
        const t = line.trim();
        if (!t) return;
        try { records.push(JSON.parse(t)); } catch {}
    });
    if (!records.length) { alert('유효한 JSON 레코드를 찾지 못했습니다.'); return; }
    loadedRecords = records;
    rebuild();
});

function rebuild() {
    entries = [];
    loadedRecords.forEach(rec => {
        const nk = nameKeyOf(rec);
        const fn = rec.importData_file_name || (nk && rec[nk] && rec[nk].sourceValue) || '';
        const img = loadedImages[fn] || null;
        const boxes = [];
        if (nk && rec[nk] && rec[nk].data) {
            rec[nk].data.forEach(d => {
                const v = d.value || {};
                const o = v.object || {};
                const left = num(o.left), top = num(o.top), w = num(o.width), h = num(o.height);
                boxes.push({
                    objectID: d.objectID || '',
                    srcData: d,
                    xmin: left, ymin: top, xmax: left + w, ymax: top + h,
                    label: v.label_symbol != null ? String(v.label_symbol) : '',
                    dirty: false, problem: false,
                });
            });
        }
        entries.push({
            dataID: rec.dataID != null ? String(rec.dataID) : '',
            filename: fn, imageFile: img, record: rec, nameKey: nk, boxes,
            unableToWork: false, unableReason: '',
        });
    });

    buildLabelIndex();
    renderLabelList();

    const withImg = entries.filter(e => e.imageFile && e.boxes.length).length;
    const noImg = entries.filter(e => !e.imageFile).length;
    document.getElementById('topStatus').textContent =
        `레코드 ${loadedRecords.length} · 매칭이미지 ${withImg}` + (noImg ? ` · 이미지없음 ${noImg}` : '') +
        ` · 총 크롭 ${totalBoxes()}`;

    currentLabel = null;
    selectedCell = null;
    setEditEnabled(false);
    document.getElementById('grid').innerHTML =
        '<div class="placeholder">왼쪽에서 라벨 그룹을 선택하세요.</div>';
    updateStatus();
}

function totalBoxes() { return entries.reduce((s, e) => s + e.boxes.length, 0); }

function buildLabelIndex() {
    labelIndex = new Map();
    entries.forEach((e, ei) => {
        e.boxes.forEach((b, bi) => {
            if (!labelIndex.has(b.label)) labelIndex.set(b.label, []);
            labelIndex.get(b.label).push({ entryIdx: ei, boxIdx: bi });
        });
    });
}

function problemRefs() {
    const refs = [];
    entries.forEach((e, ei) => e.boxes.forEach((b, bi) => { if (b.problem) refs.push({ entryIdx: ei, boxIdx: bi }); }));
    return refs;
}

function unableRefs() {
    const refs = [];
    entries.forEach((e, ei) => { if (e.unableToWork) e.boxes.forEach((b, bi) => refs.push({ entryIdx: ei, boxIdx: bi })); });
    return refs;
}

// ── 사이드바 ──────────────────────────────────────────────
function renderLabelList() {
    const list = document.getElementById('labelList');
    list.innerHTML = '';

    // 문제 그룹 (맨 위)
    const pc = problemRefs().length;
    const pdiv = document.createElement('div');
    pdiv.className = 'label-item problem-group' + (currentLabel === PROBLEM_GROUP ? ' active' : '');
    pdiv.innerHTML = `<span class="chip">&#9873;</span><span>문제 표시</span><span class="cnt">${pc}</span>`;
    pdiv.onclick = () => selectLabel(PROBLEM_GROUP);
    list.appendChild(pdiv);

    // 작업 불가 그룹
    const uc = unableRefs().length;
    const udiv = document.createElement('div');
    udiv.className = 'label-item unable-group' + (currentLabel === UNABLE_GROUP ? ' active' : '');
    udiv.innerHTML = `<span class="chip">&#128683;</span><span>작업 불가</span><span class="cnt">${uc}</span>`;
    udiv.onclick = () => selectLabel(UNABLE_GROUP);
    list.appendChild(udiv);

    const labels = [...labelIndex.keys()].sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
    labels.forEach(lb => {
        const refs = labelIndex.get(lb);
        if (!refs.length) return;
        const color = colorForLabel(lb);
        const div = document.createElement('div');
        div.className = 'label-item' + (currentLabel === lb ? ' active' : '');
        div.innerHTML = `<span class="chip" style="background:${color};color:${textColorFor(color)}">${lb === '' ? '∅' : escapeHtml(lb)}</span>` +
            `<span>라벨 ${lb === '' ? '(빈값)' : escapeHtml(lb)}</span><span class="cnt">${refs.length}</span>`;
        div.onclick = () => selectLabel(lb);
        list.appendChild(div);
    });
}

function escapeHtml(s) { return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

// ── 이미지 캐시 (LRU) ─────────────────────────────────────
const imgCache = new Map();   // filename -> {img, url}
const IMG_CACHE_MAX = 50;
const imgPending = new Map();  // filename -> Promise

function loadFrameImage(filename) {
    if (imgCache.has(filename)) {
        const v = imgCache.get(filename);
        imgCache.delete(filename); imgCache.set(filename, v); // LRU 갱신
        return Promise.resolve(v.img);
    }
    if (imgPending.has(filename)) return imgPending.get(filename);
    const file = loadedImages[filename];
    if (!file) return Promise.resolve(null);
    const p = new Promise((resolve) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
            imgPending.delete(filename);
            imgCache.set(filename, { img, url });
            // evict
            while (imgCache.size > IMG_CACHE_MAX) {
                const oldKey = imgCache.keys().next().value;
                const old = imgCache.get(oldKey);
                imgCache.delete(oldKey);
                URL.revokeObjectURL(old.url);
            }
            resolve(img);
        };
        img.onerror = () => { imgPending.delete(filename); URL.revokeObjectURL(url); resolve(null); };
        img.src = url;
    });
    imgPending.set(filename, p);
    return p;
}

// ── 그리드 ────────────────────────────────────────────────
let observer = null;

function selectLabel(label) {
    currentLabel = label;
    selectedCell = null;
    setEditEnabled(false);
    renderLabelList();
    document.getElementById('cropInfo').textContent =
        (label === PROBLEM_GROUP ? '문제 표시된 크롭'
            : label === UNABLE_GROUP ? '작업 불가 프레임의 크롭'
            : `라벨 [${label === '' ? '빈값' : label}]`) + ' 그룹';
    renderGrid();
}

function refsForCurrent() {
    if (currentLabel === PROBLEM_GROUP) return problemRefs();
    if (currentLabel === UNABLE_GROUP) return unableRefs();
    return (labelIndex.get(currentLabel) || []).slice();
}

function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    if (observer) observer.disconnect();
    observer = new IntersectionObserver(onIntersect, { root: document.getElementById('gridWrap'), rootMargin: '200px' });

    const refs = refsForCurrent();
    if (!refs.length) {
        grid.innerHTML = '<div class="placeholder">이 그룹에 크롭이 없습니다.</div>';
        return;
    }

    refs.forEach(ref => {
        const entry = entries[ref.entryIdx];
        const box = entry.boxes[ref.boxIdx];
        const cell = document.createElement('div');
        cell.className = 'cell' + (entry.unableToWork ? ' unable' : '') + (box.problem ? ' problem' : '') + (box.dirty ? ' edited' : '');
        cell.dataset.entryIdx = ref.entryIdx;
        cell.dataset.boxIdx = ref.boxIdx;
        cell._drawn = false;

        const cv = document.createElement('canvas');
        cv.width = 104; cv.height = 104;
        cell.appendChild(cv);

        const cap = document.createElement('div');
        cap.className = 'cap';
        cap.textContent = entry.dataID || entry.filename;
        cap.title = entry.filename;
        cell.appendChild(cap);

        const fb = document.createElement('button');
        fb.className = 'flagbtn';
        fb.innerHTML = '&#9873;';
        fb.title = '문제 표시';
        fb.onclick = (ev) => { ev.stopPropagation(); selectCell(cell); toggleProblem(); };
        cell.appendChild(fb);

        cell.onclick = () => selectCell(cell);
        cell.ondblclick = () => { selectCell(cell); openOriginal(); };
        grid.appendChild(cell);
        observer.observe(cell);
    });
}

function onIntersect(items) {
    items.forEach(it => {
        if (!it.isIntersecting) return;
        const cell = it.target;
        if (cell._drawn) { observer.unobserve(cell); return; }
        drawCrop(cell);
    });
}

async function drawCrop(cell) {
    const entry = entries[+cell.dataset.entryIdx];
    const box = entry.boxes[+cell.dataset.boxIdx];
    const cv = cell.querySelector('canvas');
    const ctx = cv.getContext('2d');
    if (!entry.imageFile) {
        ctx.fillStyle = '#222'; ctx.fillRect(0, 0, cv.width, cv.height);
        ctx.fillStyle = '#888'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('이미지 없음', cv.width / 2, cv.height / 2);
        cell._drawn = true; return;
    }
    const img = await loadFrameImage(entry.filename);
    if (!img) return;
    cell._drawn = true;
    observer.unobserve(cell);

    const bw = box.xmax - box.xmin, bh = box.ymax - box.ymin;
    const pad = Math.max(4, Math.max(bw, bh) * 0.15);
    const sx = Math.max(0, box.xmin - pad), sy = Math.max(0, box.ymin - pad);
    const sx2 = Math.min(img.width, box.xmax + pad), sy2 = Math.min(img.height, box.ymax + pad);
    const sw = Math.max(1, sx2 - sx), sh = Math.max(1, sy2 - sy);

    const cw = cv.width, ch = cv.height;
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cw, ch);
    const scale = Math.min(cw / sw, ch / sh);
    const dw = sw * scale, dh = sh * scale;
    const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
    ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);

    // 박스 외곽선 (크롭 안에서의 실제 박스 위치)
    const bxOnCanvas = dx + (box.xmin - sx) * scale;
    const byOnCanvas = dy + (box.ymin - sy) * scale;
    ctx.strokeStyle = '#4ecdc4'; ctx.lineWidth = 1;
    ctx.strokeRect(bxOnCanvas, byOnCanvas, bw * scale, bh * scale);

    // 라벨 chip
    const color = colorForLabel(box.label);
    ctx.font = 'bold 12px Consolas, monospace';
    const t = box.label === '' ? '∅' : box.label;
    const tw = ctx.measureText(t).width + 6;
    ctx.fillStyle = color; ctx.fillRect(0, 0, tw, 16);
    ctx.fillStyle = textColorFor(color); ctx.fillText(t, 3, 12);
}

// ── 선택 / 편집 ───────────────────────────────────────────
function selectCell(cell) {
    if (selectedCell) selectedCell.classList.remove('selected');
    selectedCell = cell;
    cell.classList.add('selected');
    const entry = entries[+cell.dataset.entryIdx];
    const box = entry.boxes[+cell.dataset.boxIdx];
    document.getElementById('cropInfo').textContent =
        `dataID ${entry.dataID} · ${box.objectID} · 라벨 [${box.label === '' ? '빈값' : box.label}]` +
        (box.problem ? ' · ⚑문제' : '') + (entry.unableToWork ? ' · 🚫작업불가' : '');
    setEditEnabled(true);
    const inp = document.getElementById('labelInput');
    inp.value = box.label;
    inp.focus(); inp.select();
    updateFlagBtn(box);
    updateUnableBtn(entry);
}

function setEditEnabled(on) {
    document.getElementById('labelInput').disabled = !on;
    document.getElementById('btnApply').disabled = !on;
    document.getElementById('btnFlag').disabled = !on;
    document.getElementById('btnUnable').disabled = !on;
    document.getElementById('btnOriginal').disabled = !on;
    if (!on) document.getElementById('labelInput').value = '';
}

function updateFlagBtn(box) {
    const btn = document.getElementById('btnFlag');
    btn.className = 'btn' + (box.problem ? ' btn-primary' : '');
    btn.innerHTML = box.problem ? '⚑ 문제 해제' : '⚑ 문제 표시';
}

function updateUnableBtn(entry) {
    const btn = document.getElementById('btnUnable');
    btn.className = 'btn' + (entry && entry.unableToWork ? ' btn-primary' : '');
    btn.innerHTML = (entry && entry.unableToWork) ? '🚫 작업불가 해제' : '🚫 작업 불가';
}

function currentBox() {
    if (!selectedCell) return null;
    return entries[+selectedCell.dataset.entryIdx].boxes[+selectedCell.dataset.boxIdx];
}

function applyLabel() {
    if (!selectedCell) return;
    const entry = entries[+selectedCell.dataset.entryIdx];
    const box = entry.boxes[+selectedCell.dataset.boxIdx];
    const newLabel = document.getElementById('labelInput').value.trim().toUpperCase();
    if (!newLabel || !/^[A-Z0-9*\-]$/.test(newLabel)) { alert('라벨은 A-Z, 0-9, -, * 중 하나여야 합니다.'); return; }
    if (newLabel === box.label) return;

    const oldLabel = box.label;
    box.label = newLabel;
    box.srcData.value.label_symbol = newLabel;
    box.dirty = true;

    // labelIndex 이동
    const oldArr = labelIndex.get(oldLabel);
    if (oldArr) {
        const i = oldArr.findIndex(r => r.entryIdx === +selectedCell.dataset.entryIdx && r.boxIdx === +selectedCell.dataset.boxIdx);
        if (i >= 0) oldArr.splice(i, 1);
    }
    if (!labelIndex.has(newLabel)) labelIndex.set(newLabel, []);
    labelIndex.get(newLabel).push({ entryIdx: +selectedCell.dataset.entryIdx, boxIdx: +selectedCell.dataset.boxIdx });

    // 현재 그룹이 라벨 그룹이면 셀 제거 (더 이상 이 그룹 소속 아님)
    const removed = selectedCell;
    selectedCell = null;
    setEditEnabled(false);
    if (currentLabel !== PROBLEM_GROUP && currentLabel !== UNABLE_GROUP && currentLabel !== newLabel) {
        removed.remove();
    } else {
        removed.classList.add('edited');
        removed.classList.remove('selected');
    }
    renderLabelList();
    updateStatus();
}

function toggleProblem() {
    const box = currentBox();
    if (!box) return;
    box.problem = !box.problem;
    if (selectedCell) selectedCell.classList.toggle('problem', box.problem);
    // 문제 그룹을 보고 있는데 해제하면 목록에서 제거
    if (currentLabel === PROBLEM_GROUP && !box.problem && selectedCell) {
        selectedCell.remove(); selectedCell = null; setEditEnabled(false);
    } else {
        updateFlagBtn(box);
    }
    renderLabelList();
    updateStatus();
}

function toggleUnable() {
    if (!selectedCell) return;
    const entry = entries[+selectedCell.dataset.entryIdx];
    if (!entry.unableToWork) {
        const r = prompt('작업 불가 사유 (선택 입력, 취소 시 표시 안 함)', entry.unableReason || '');
        if (r === null) return;   // 취소
        entry.unableToWork = true;
        entry.unableReason = r.trim();
    } else {
        entry.unableToWork = false;
        entry.unableReason = '';
    }
    // 같은 프레임(dataID)의 현재 화면 셀 전부 표시 갱신
    document.querySelectorAll('#grid .cell').forEach(c => {
        if (+c.dataset.entryIdx === +selectedCell.dataset.entryIdx) c.classList.toggle('unable', entry.unableToWork);
    });
    // 작업불가 그룹을 보는 중 해제하면 목록에서 제거
    if (currentLabel === UNABLE_GROUP && !entry.unableToWork) {
        document.querySelectorAll('#grid .cell').forEach(c => { if (+c.dataset.entryIdx === +selectedCell.dataset.entryIdx) c.remove(); });
        selectedCell = null; setEditEnabled(false);
    } else {
        updateUnableBtn(entry);
    }
    renderLabelList();
    updateStatus();
}

// ── 다운로드 ──────────────────────────────────────────────
function saveJson() {
    const recs = entries.filter(e => e.record);
    if (!recs.length) { alert('저장할 데이터가 없습니다.'); return; }
    const ndjson = recs.map(e => {
        if (e.unableToWork) {
            const clone = Object.assign({}, e.record, { unableToWork: 1 });
            if (e.nameKey && clone[e.nameKey]) clone[e.nameKey] = Object.assign({}, clone[e.nameKey], { data: [] });
            return JSON.stringify(clone);
        }
        return JSON.stringify(e.record);
    }).join('\n') + '\n';
    downloadBlob(ndjson, 'application/json', jsonFileName.replace(/\.[^.]+$/, '') + '_reviewed.json');
    const edited = entries.reduce((s, e) => s + e.boxes.filter(b => b.dirty).length, 0);
    alert(`교정 JSON 저장 완료 (${recs.length}개 레코드, 라벨수정 ${edited}건).`);
}

function exportCsv() {
    const header = ['dataID', 'filename', 'type', 'problemBoxCount', 'problemLabels', 'problemObjectIDs', 'reason'];
    const rows = [];
    // dataID 단위 1행, 중복 없음. 작업불가면 작업불가 행(어노테이션 삭제되므로 문제행 대신), 아니면 문제 행
    entries.forEach(e => {
        if (e.unableToWork) {
            rows.push([e.dataID, e.filename, '작업불가', '', '', '', '작업불가 처리' + (e.unableReason ? ' — ' + e.unableReason : '')]);
            return;
        }
        const pbs = e.boxes.filter(b => b.problem);
        if (!pbs.length) return;
        rows.push([e.dataID, e.filename, '문제', pbs.length, pbs.map(b => b.label).join(' '), pbs.map(b => b.objectID).join(' '), '']);
    });
    if (!rows.length) { alert('문제/작업불가로 표시된 항목이 없습니다.'); return; }
    const lines = [header, ...rows].map(r => r.map(csvCell).join(','));
    const csv = '﻿' + lines.join('\r\n') + '\r\n';
    downloadBlob(csv, 'text/csv;charset=utf-8;', jsonFileName.replace(/\.[^.]+$/, '') + '_problems.csv');
    const unableN = rows.filter(r => r[2] === '작업불가').length;
    const probN = rows.filter(r => r[2] === '문제').length;
    alert(`CSV 저장 완료 — 작업불가 ${unableN}건, 문제 ${probN}건 (총 ${rows.length}개 dataID, 중복 제거).`);
}

function downloadBlob(content, type, name) {
    const blob = new Blob([content], { type });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
}

// ── 상태 ──────────────────────────────────────────────────
function updateStatus() {
    const edited = entries.reduce((s, e) => s + e.boxes.filter(b => b.dirty).length, 0);
    const probBoxes = entries.reduce((s, e) => s + e.boxes.filter(b => b.problem).length, 0);
    const probFrames = entries.filter(e => e.boxes.some(b => b.problem)).length;
    const unable = entries.filter(e => e.unableToWork).length;
    document.getElementById('bottomStatus').textContent =
        `크롭 ${totalBoxes()} · 라벨수정 ${edited} · 문제박스 ${probBoxes} · 문제프레임(dataID) ${probFrames} · 작업불가 ${unable}`;
}

// ── 원본 이미지 모달 ──────────────────────────────────────
let originalRef = null;   // {entryIdx, boxIdx}

function overlayVisible() { return document.getElementById('overlay').style.display === 'flex'; }

async function openOriginal() {
    if (!selectedCell) return;
    const entryIdx = +selectedCell.dataset.entryIdx;
    const boxIdx = +selectedCell.dataset.boxIdx;
    const entry = entries[entryIdx];
    if (!entry.imageFile) { alert('이 데이터에는 매칭된 원본 이미지가 없습니다.'); return; }
    originalRef = { entryIdx, boxIdx };
    const box = entry.boxes[boxIdx];
    document.getElementById('ovCaption').textContent =
        `dataID ${entry.dataID} · ${entry.filename} · 라벨 [${box.label === '' ? '빈값' : box.label}] · 박스 #${boxIdx + 1}/${entry.boxes.length}`;
    document.getElementById('overlay').style.display = 'flex';
    await drawOriginal();
}

async function drawOriginal() {
    if (!originalRef) return;
    const entry = entries[originalRef.entryIdx];
    const img = await loadFrameImage(entry.filename);
    if (!img || !originalRef) return;

    const wrap = document.getElementById('ovCanvasWrap');
    const cv = document.getElementById('ovCanvas');
    const ctx = cv.getContext('2d');
    const ww = wrap.clientWidth, wh = wrap.clientHeight;
    cv.width = ww; cv.height = wh;
    ctx.clearRect(0, 0, ww, wh);

    const scale = Math.min(ww / img.width, wh / img.height);
    const sw = img.width * scale, sh = img.height * scale;
    const ox = (ww - sw) / 2, oy = (wh - sh) / 2;
    ctx.drawImage(img, ox, oy, sw, sh);

    // 같은 프레임의 모든 박스 표시 (선택 박스 강조)
    entry.boxes.forEach((b, i) => {
        const x = ox + b.xmin * scale, y = oy + b.ymin * scale;
        const w = (b.xmax - b.xmin) * scale, h = (b.ymax - b.ymin) * scale;
        const sel = i === originalRef.boxIdx;
        ctx.strokeStyle = sel ? '#4ecdc4' : 'rgba(255,255,255,0.45)';
        ctx.lineWidth = sel ? 2 : 1;
        ctx.strokeRect(x, y, w, h);
        if (sel) {
            const color = colorForLabel(b.label);
            ctx.font = 'bold 13px Consolas, monospace';
            const t = b.label === '' ? '∅' : b.label;
            const tw = ctx.measureText(t).width + 6;
            const ly = y - 16 > oy ? y - 16 : y;
            ctx.fillStyle = color; ctx.fillRect(x, ly, tw, 16);
            ctx.fillStyle = textColorFor(color); ctx.fillText(t, x + 3, ly + 12);
        }
    });

    // 작업 불가 오버레이
    if (entry.unableToWork) {
        ctx.fillStyle = 'rgba(30,30,30,0.5)';
        ctx.fillRect(ox, oy, sw, sh);
        ctx.strokeStyle = '#ffb000'; ctx.lineWidth = 6;
        ctx.strokeRect(ox + 3, oy + 3, sw - 6, sh - 6);
        ctx.fillStyle = 'rgba(255,176,0,0.95)';
        ctx.font = 'bold 34px "Malgun Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('🚫 작 업 불 가', ox + sw / 2, oy + sh / 2);
        if (entry.unableReason) {
            ctx.fillStyle = '#fff'; ctx.font = 'bold 16px "Malgun Gothic", sans-serif';
            ctx.fillText(entry.unableReason, ox + sw / 2, oy + sh / 2 + 30);
        }
        ctx.textAlign = 'left';
    }
}

function closeOriginal() {
    originalRef = null;
    document.getElementById('overlay').style.display = 'none';
}

window.addEventListener('resize', () => { if (overlayVisible()) drawOriginal(); });

// ── 키보드 ────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
    if (overlayVisible()) {
        if (e.key === 'Escape') { e.preventDefault(); closeOriginal(); }
        return;
    }
    const inLabel = e.target.id === 'labelInput';
    if (inLabel) {
        if (e.key === 'Enter') { e.preventDefault(); applyLabel(); }
        else if (e.key === 'Escape') { e.preventDefault(); e.target.blur(); }
        return;
    }
    if (e.target.tagName === 'INPUT') return;
    if (!selectedCell) return;
    if (e.key === 'q') { e.preventDefault(); toggleProblem(); }
    else if (e.key === 'o' || e.key === 'O') { e.preventDefault(); openOriginal(); }
    else if (/^[a-zA-Z0-9\-]$/.test(e.key)) {
        const inp = document.getElementById('labelInput');
        inp.value = e.key.toUpperCase();
        inp.focus(); inp.select();
    }
});
</script>

        <div class="ov-head">
            <span id="ovCaption"></span>
            <button class="btn" onclick="closeOriginal()">닫기 (Esc) &#10005;</button>
        </div>
        <div class="ov-canvas-wrap" id="ovCanvasWrap"><canvas id="ovCanvas"></canvas></div>
    </div>
</div>
